  <style>
    :root{ --container-w: min(100%, 1100px); }
    html, body { width: 100%; overflow-x: hidden; }
    /* Cadre général de la page (hors pied de page) */
    .page-frame {
      width: 90vw; margin: 0 auto; box-sizing: border-box;
      border: 3px solid #333; border-radius: 16px; padding: 12px 0 24px;
      display: flex; flex-direction: column; align-items: center;
    }
    .page-nav, .lang-buttons, .score-text { width: var(--container-w); }
    .score-text { text-align: center; font-size: 1.25rem; font-weight: 600; padding: 10px 0; }
    .educative-video{ width:min(90vw, 22vw); height:25vh; max-width:440px; border-radius:12px; box-shadow:0 2px 12px rgba(0,0,0,.12)}
    .canvas-container { width: var(--container-w); height: 65vh; margin: 0 auto; display: flex; justify-content: center; align-items: center; }
    canvas { display: block; width: 100%; height: 100%; }
  </style>
</head>
<body>
  <div class="page-frame fade-in">
    <nav class="page-nav" aria-label="Navigation entre les jeux">
      <a href="index.html">Accueil</a>
      <a href="j_apprends_les_saveurs_5_langues_et_video_responsive.html">Éprouvettes</a>
      <a href="j_apprends_les_saveurs_4_langues_circulaire.html" aria-current="page">Circulaire</a>
    </nav>

    <div class="score-text" id="scoreDisplay">Score : 0/10</div>

    <div class="lang-buttons">
      <button data-lang="fr">FR</button>
      <button data-lang="en">EN</button>
      <button data-lang="es">ES</button>
      <button data-lang="de">DE</button>
      <button data-lang="it">IT</button>
    </div>

    <!-- Vidéo éducative -->
    <video id="eduVideo" class="educative-video" controls src="videos/Bunnie_apprendre_les_saveurs_Francais.mp4">
      Votre navigateur ne supporte pas la lecture de vidéos.
    </video>

    <div class="canvas-container">
      <canvas id="canvas2"></canvas>
    </div>
  </div>

  <script>
    // Exemples de listes de saveurs par langue
    const flavorsByLang = {
      fr: [
        ['Citron','Chocolat','Coco','Menthe','Fraise','Orange','Vanille','Raisin','Pomme','Myrtille'],
        ['Framboise','Cerise','Banane','Mangue','Ananas','Kiwi','Pêche','Abricot','Grenade','Passion'],
        ['Noisette','Caramel salé','Miel','Lavande','Yuzu','Thé vert','Gingembre','Pistache','Sésame','Chocolat blanc'],
        ['Melon','Pastèque','Pamplemousse','Cassis','Litchi','Amande','Cannelle','Réglisse','Fruit du dragon','Mûre'],
        ['Poire','Prune','Figue','Datte','Café','Praliné','Guimauve','Barbe à papa','Popcorn','Cardamome'],
        ['Papaye','Goyave','Tamarin','Rose','Fleur d\'oranger','Noix de pécan','Châtaigne','Citron vert','Nougat','Meringue']
      ],
      en: [
        ['Lemon','Chocolate','Coconut','Mint','Strawberry','Orange','Vanilla','Grape','Apple','Blueberry'],
        ['Raspberry','Cherry','Banana','Mango','Pineapple','Kiwi','Peach','Apricot','Pomegranate','Passion Fruit'],
        ['Hazelnut','Salted Caramel','Honey','Lavender','Yuzu','Green Tea','Ginger','Pistachio','Sesame','White Chocolate'],
        ['Melon','Watermelon','Grapefruit','Blackcurrant','Lychee','Almond','Cinnamon','Licorice','Dragon Fruit','Blackberry'],
        ['Pear','Plum','Fig','Date','Coffee','Praline','Marshmallow','Cotton Candy','Popcorn','Cardamom'],
        ['Papaya','Guava','Tamarind','Rose','Orange Blossom','Pecan','Chestnut','Lime','Nougat','Meringue']
      ],
      es: [
        ['Limón','Chocolate','Coco','Menta','Fresa','Naranja','Vainilla','Uva','Manzana','Arándano'],
        ['Frambuesa','Cereza','Plátano','Mango','Piña','Kiwi','Melocotón','Albaricoque','Granada','Maracuyá'],
        ['Avellana','Caramelo Salado','Miel','Lavanda','Yuzu','Té Verde','Jengibre','Pistacho','Sésamo','Chocolate Blanco'],
        ['Melón','Sandía','Pomelo','Grosella Negra','Lichi','Almendra','Canela','Regaliz','Pitahaya','Mora'],
        ['Pera','Ciruela','Higo','Dátil','Café','Praliné','Malvavisco','Algodón de Azúcar','Palomitas','Cardamomo'],
        ['Papaya','Guayaba','Tamarindo','Rosa','Azahar','Nuez Pecana','Castaña','Lima','Turrón','Merengue']
      ],
      de: [
        ['Zitrone','Schokolade','Kokos','Minze','Erdbeere','Orange','Vanille','Traube','Apfel','Blaubeere'],
        ['Himbeere','Kirsche','Banane','Mango','Ananas','Kiwi','Pfirsich','Aprikose','Granatapfel','Passionsfrucht'],
        ['Haselnuss','Gesalzener Karamell','Honig','Lavendel','Yuzu','Grüner Tee','Ingwer','Pistazie','Sesam','Weiße Schokolade'],
        ['Melone','Wassermelone','Grapefruit','Schwarze Johannisbeere','Litschi','Mandel','Zimt','Lakritz','Drachenfrucht','Brombeere'],
        ['Birne','Pflaume','Feige','Dattel','Kaffee','Praline','Marshmallow','Zuckerwatte','Popcorn','Kardamom'],
        ['Papaya','Guave','Tamarinde','Rose','Orangenblüte','Pekannuss','Kastanie','Limette','Nougat','Baiser']
      ],
      it: [
        ['Limone','Cioccolato','Cocco','Menta','Fragola','Arancia','Vaniglia','Uva','Mela','Mirtillo'],
        ['Lampone','Ciliegia','Banana','Mango','Ananas','Kiwi','Pesca','Albicocca','Melograno','Frutto della Passione'],
        ['Nocciola','Caramello Salato','Miele','Lavanda','Yuzu','Tè Verde','Zenzero','Pistacchio','Sesamo','Cioccolato Bianco'],
        ['Melone','Anguria','Pompelmo','Ribes Nero','Litchi','Mandorla','Cannella','Liquirizia','Frutto del Drago','Mora'],
        ['Pera','Prugna','Fico','Dattero','Caffè','Pralina','Marshmallow','Zucchero Filato','Popcorn','Cardamomo'],
        ['Papaia','Guava','Tamarindo','Rosa','Fiori d\'Arancio','Noce Pecan','Castagna','Lime','Torrone','Meringa']
      ]
    };

    // Couleurs représentatives de chaque saveur, alignées sur flavorsByLang.fr (même ordre pour toutes les langues)
    const colorsLists = [
      ['yellow','saddlebrown','white','mediumseagreen','red','orange','beige','purple','yellowgreen','royalblue'],
      ['crimson','red','gold','orange','gold','yellowgreen','peachpuff','sandybrown','firebrick','purple'],
      ['tan','peru','gold','lavender','gold','darkseagreen','peru','yellowgreen','wheat','ivory'],
      ['sandybrown','crimson','salmon','indigo','lightcoral','burlywood','chocolate','black','deeppink','darkslateblue'],
      ['palegreen','mediumpurple','mediumvioletred','peru','saddlebrown','tan','lightpink','hotpink','khaki','darkkhaki'],
      ['darkorange','lightsalmon','sienna','pink','wheat','rosybrown','maroon','limegreen','bisque','white']
    ];

    const videoSrcByLang = {
      fr: 'videos/Bunnie_apprendre_les_saveurs_Francais.mp4',
      en: 'videos/Bunnie_apprendre_les_saveurs_Anglais.mp4',
      es: 'videos/Bunnie_apprendre_les_saveurs_Espagnole.mp4',
      de: 'videos/Bunnie_apprendre_les_saveurs_Allemand.mp4',
      it: 'videos/Bunnie_apprendre_les_saveurs_Italien.mp4'
    };
    const videoEl = document.getElementById('eduVideo');
    function updateVideo(){ videoEl.src = videoSrcByLang[currentLang]; videoEl.load(); }

    let currentLang = 'fr';
    let round = 0;
    let clicked = new Set();
    let score = 0;

    const canvas = document.getElementById('canvas2');
    const ctx = canvas.getContext('2d');

    function resize() {
      canvas.width = canvas.parentElement.clientWidth;
      canvas.height = canvas.parentElement.clientHeight;
    }
    window.addEventListener('resize', () => { resize(); setup(); });
    window.addEventListener('load', () => { resize(); setup(); });
    resize();

    document.querySelectorAll('.lang-buttons button').forEach(btn => {
      btn.onclick = () => {
        currentLang = btn.dataset.lang;
        updateVideo();
        nextRound(true);
      };
    });

    // Flavors and circles for this round
    let flavors = [];
    let circles = [];

    function setup() {
      clicked.clear();
      flavors = flavorsByLang[currentLang][round % flavorsByLang[currentLang].length];
      const colors = colorsLists[round % colorsLists.length];
      circles = flavors.map((label, i) => ({
        label,
        x: canvas.width / 2 + Math.cos((i / flavors.length) * 2 * Math.PI) * 150,
        y: canvas.height / 2 + Math.sin((i / flavors.length) * 2 * Math.PI) * 150,
        r: 30,
        color: colors[i]
      }));
      draw();
    }

    function draw() {
      ctx.clearRect(0, 0, canvas.width, canvas.height);
      circles.forEach(c => {
        ctx.beginPath();
        ctx.arc(c.x, c.y, c.r, 0, 2 * Math.PI);
        ctx.fillStyle = clicked.has(c.label) ? '#ccc' : c.color;
        ctx.fill();
        if (c.color === 'white') {
          ctx.lineWidth = 1.5;
          ctx.strokeStyle = '#999';
          ctx.stroke();
        }
        ctx.fillStyle = '#000';
        ctx.font = '16px sans-serif';
        ctx.textAlign = 'center';
        ctx.fillText(c.label, c.x, c.y + c.r + 16);
      });
    }

    // Bubble class (bulles de la couleur de la saveur cliquée, comme sur la page éprouvettes)
    class Bubble {
      constructor(x, y, color, spread) {
        this.x = x + (Math.random() * spread - spread / 2);
        this.y = y + (Math.random() * spread - spread / 2);
        this.r = Math.random() * 12 + 6;
        this.color = color;
        this.v = Math.random() * 50 + 20; // px/sec
      }
      update(dt) {
        this.y -= this.v * dt;
      }
      draw() {
        ctx.beginPath();
        ctx.arc(this.x, this.y, this.r, 0, 2 * Math.PI);
        ctx.fillStyle = this.color;
        ctx.fill();
        if (this.color === 'white') {
          ctx.lineWidth = 1;
          ctx.strokeStyle = '#000';
          ctx.stroke();
        }
      }
    }

    let bubbles = [];

    canvas.addEventListener('click', e => {
      const rect = canvas.getBoundingClientRect();
      const mx = e.clientX - rect.left;
      const my = e.clientY - rect.top;
      circles.forEach(c => {
        const dist = Math.hypot(mx - c.x, my - c.y);
        if (dist < c.r) {
          // generate bubbles for any click
          for (let i = 0; i < 20; i++) bubbles.push(new Bubble(c.x, c.y, c.color, c.r));
          // update score only first time
          if (!clicked.has(c.label)) {
            clicked.add(c.label);
            score = clicked.size;
            // display score
            document.getElementById('scoreDisplay').textContent = `Score: ${score}/10`;
            if (clicked.size === circles.length) {
              setTimeout(() => { alert(`Bravo mon petit CHOU ! On passe au Round ${round + 2}`); nextRound(); }, 500);
            }
          }
        }
      });
    });

    let lastTs = 0;
    function animate(ts) {
      const dt = lastTs ? (ts - lastTs) / 1000 : 0;
      lastTs = ts;
      ctx.clearRect(0, 0, canvas.width, canvas.height);
      draw();
      bubbles.forEach((b, i) => {
        b.update(dt);
        b.draw();
        if (b.y + b.r < 0) bubbles.splice(i, 1);
      });
      requestAnimationFrame(animate);
    }

    function nextRound(force = false) {
      if (clicked.size === circles.length || force) {
        round++;
        score = 0;
        document.getElementById('scoreDisplay').textContent = `Score: 0/10`;
        bubbles = [];
        setup();
      }
    }

    // Init
    setup();
    requestAnimationFrame(animate);
  </script>

<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>J'apprends les saveurs</title>
  <style>
    body, html { margin: 0; padding: 0; display: flex; flex-direction: column; align-items: center; }
    .lang-buttons { margin: 10px; }
    .lang-buttons button { margin: 0 5px; padding: 5px 10px; font-size: 1rem; cursor: pointer; }
    .canvas-container {
      width: 70vw;
      /* leave height auto-packed */
      display: flex;
      flex-direction: column;
      align-items: center;
    }
    .educative-video {
      width: 20vw;
      height: 25vh;
      margin-bottom: 10px;
    }
    canvas {
      border: 1px solid #333;
      width: 100%;
      /* fixed height for canvas drawing area */
      height: 60vh;
    }
    footer { 
      color: grey; 
      position: absolute;
      margin-top: 10px;
      bottom: -10px;
      left: 10px;
      width: 100vw;   /* 1/1 de la largeur de l'écran */
      text-align: center;
    }
  </style>

</head>
<body>
  <div class="lang-buttons">
    <button data-lang="fr">FR</button>
    <button data-lang="en">EN</button>
    <button data-lang="es">ES</button>
    <button data-lang="de">DE</button>
    <button data-lang="it">IT</button>
  </div>
  <div class="canvas-container">
    <video class="educative-video" controls>
      <source src="Bunnie_apprendre_les_saveurs.mp4" type="video/mp4">
      Votre navigateur ne supporte pas la lecture vidéo.
    </video>
    <canvas id="canvas2"></canvas>
  </div>
  <script>
    (function(){
      const c2 = document.getElementById('canvas2');
      const ctx2 = c2.getContext('2d');
      let w2, h2;
      const tw2 = 60, th2 = 150, gap2 = 20, cr = 30;

      const flavorsByLang = {
        fr: [
          ['Citron','Chocolat','Coco','Menthe','Fraise','Orange','Vanille','Raisin','Pomme','Myrtille'],
          ['Framboise','Cerise','Banane','Mangue','Ananas','Kiwi','Pêche','Abricot','Grenade','Passion'],
          ['Noisette','Caramel','Miel','Lavande','Yuzu','Thé vert','Gingembre','Pistache','Sésame','Chocolat blanc']
        ],
        en: [
          ['Lemon','Chocolate','Coconut','Mint','Strawberry','Orange','Vanilla','Grape','Apple','Blueberry'],
          ['Raspberry','Cherry','Banana','Mango','Pineapple','Kiwi','Peach','Apricot','Pomegranate','Passion Fruit'],
          ['Hazelnut','Salted Caramel','Honey','Lavender','Yuzu','Green Tea','Ginger','Pistachio','Sesame','White Chocolate']
        ],
        es: [
          ['Limón','Chocolate','Coco','Menta','Fresa','Naranja','Vainilla','Uva','Manzana','Arándano'],
          ['Frambuesa','Cereza','Plátano','Mango','Piña','Kiwi','Melocotón','Albaricoque','Granada','Maracuyá'],
          ['Avellana','Caramelo salado','Miel','Lavanda','Yuzu','Té verde','Jengibre','Pistacho','Sésamo','Chocolate blanco']
        ],
        de: [
          ['Zitrone','Schokolade','Kokos','Minze','Erdbeere','Orange','Vanille','Traube','Apfel','Heidelbeere'],
          ['Himbeere','Kirsche','Banane','Mango','Ananas','Kiwi','Pfirsich','Aprikose','Granatapfel','Passionsfrucht'],
          ['Haselnuss','Karamell','Honig','Lavendel','Yuzu','Grüner Tee','Ingwer','Pistazie','Sesam','Weiße Schokolade']
        ],
        it: [
          ['Limone','Cioccolato','Cocco','Menta','Fragola','Arancia','Vaniglia','Uva','Mela','Mirtillo'],
          ['Lampone','Ciliegia','Banana','Mango','Ananas','Kiwi','Pesca','Albicocca','Melograno','Frutto della passione'],
          ['Nocciola','Caramello salato','Miele','Lavanda','Yuzu','Tè verde','Zenzero','Pistacchio','Sesamo','Cioccolato bianco']
        ]
      };

      const colorsLists = [
        ['yellow','brown','white','green','red','orange','beige','purple','lightgreen','blue'],
        ['purple','red','yellow','orange','yellow','green','peach','apricot','red','purple'],
        ['brown','brown','yellow','lavender','yellow','green','grey','green','beige','white']
      ];

      let lang = 'fr', round = 0, score = 0;
      let clicked = new Set(), tubes = [], bubbles = [];

      function setup(){
        w2 = c2.width = c2.clientWidth;
        h2 = c2.height = c2.clientHeight;
        tubes = [];
        const flavors = flavorsByLang[lang][round % flavorsByLang[lang].length];
        const colors = colorsLists[round % colorsLists.length];
        const count = flavors.length;
        const totalW = count * tw2 + (count - 1) * gap2;
        const startX = (w2 - totalW) / 2 + tw2/2;
        for(let i=0; i<count; i++){
          tubes.push({ x: startX + i*(tw2+gap2), y: h2/2, color: colors[i], flavor: flavors[i] });
        }
      }
      window.addEventListener('resize', setup);
      setup();

      function draw(){
        ctx2.clearRect(0, 0, w2, h2);
        ctx2.save();
        ctx2.font = '20px sans-serif';
        ctx2.fillStyle = '#000';
        ctx2.textAlign = 'center';
        ctx2.fillText(`Score : ${score}/${tubes.length}`, w2/2, 30);
        ctx2.restore();
        
        // draw tubes and bubbles as before
        tubes.forEach(t => {
          ctx2.save();
          ctx2.translate(t.x, t.y);
          ctx2.beginPath();
          ctx2.moveTo(-tw2/2, -th2/2);
          ctx2.lineTo(-tw2/2, th2/2 - 5);
          ctx2.arc(0, th2/2 - 5, tw2/2, Math.PI, 0);
          ctx2.lineTo(tw2/2, -th2/2);
          ctx2.closePath();
          ctx2.stroke();
          ctx2.beginPath();
          ctx2.arc(0, th2/2 - 5, tw2/2, 0, 2*Math.PI);
          ctx2.stroke();
          ctx2.beginPath();
          ctx2.arc(0, th2/2 - 30, cr, 0, 2*Math.PI);
          ctx2.fillStyle = t.color;
          ctx2.fill();
          ctx2.fillStyle = '#000';
          ctx2.font = '16px sans-serif';
          ctx2.textAlign = 'center';
          ctx2.fillText(t.flavor, 0, th2/2 - 30 + cr + 20);
          ctx2.restore();
        });

        bubbles.forEach(b => {
          ctx2.beginPath();
          ctx2.arc(b.x, b.y, b.r, 0, 2 * Math.PI);
          ctx2.fillStyle = b.color;
          ctx2.fill();
          if(b.color === 'white'){
            ctx2.lineWidth = 1; ctx2.strokeStyle = '#000'; ctx2.stroke();
          }
        });
      }

      function update(dt){
        for(let i = bubbles.length - 1; i >= 0; i--){
          const b = bubbles[i];
          b.y -= b.v * dt;
          if(b.y + b.r < 0) bubbles.splice(i, 1);
        }
      }

      let lastTime = 0;
      function loop(ts){
        const dt = (ts - lastTime) / 1000;
        lastTime = ts;
        update(dt);
        draw();
        requestAnimationFrame(loop);
      }
      requestAnimationFrame(loop);

      c2.addEventListener('mousemove', e => {
        const rect = c2.getBoundingClientRect();
        const mx = e.clientX - rect.left;
        const my = e.clientY - rect.top;
        let hover = false;
        tubes.forEach(t => {
          if(Math.hypot(mx - t.x, my - (t.y + th2/2 - 30)) < cr) hover = true;
        });
        c2.style.cursor = hover ? 'pointer' : 'default';
      });

      c2.addEventListener('click', e => {
        const rect = c2.getBoundingClientRect();
        const mx = e.clientX - rect.left;
        const my = e.clientY - rect.top;
        tubes.forEach((t, i) => {
          const cx = t.x; const cy = t.y + th2/2 - 30;
          if(Math.hypot(mx - cx, my - cy) < cr) {
            for(let k = 0; k < 20; k++){
              bubbles.push({ x: cx + (Math.random()*cr - cr/2), y: cy + (Math.random()*cr - cr/2), r: Math.random()*12 + 6, color: t.color, v: Math.random()*50 + 20 });
            }
            if(!clicked.has(i)){
              clicked.add(i); score++;
              if(clicked.size === tubes.length){ setTimeout(() => { alert('Bravo ! Vous avez complété ce tour.'); nextRound(); }, 100); }
            }
          }
        });
      });

      function nextRound(){ round++; score = 0; clicked.clear(); bubbles = []; setup(); }

      document.querySelectorAll('.lang-buttons button').forEach(btn => {
        btn.addEventListener('click', () => { lang = btn.getAttribute('data-lang'); nextRound(); });
      });
    })();

  </script>

  <!-- Footer avec texte ajouté -->
  <footer>  
    <p> &copy; J'apprends les Saveurs - Tous droits réservés ( créé par Joel Sandé, Saguenay ) à but éducatif : j'apprends en m'amusant. Animation pour faciliter mes apprentissages. Maternelle, Garderie, 2ans +
        <br> * * * Merci de partager massivement ce jeu éducatif :) * * * 
    </p>
  </footer>
</body>
</html>
